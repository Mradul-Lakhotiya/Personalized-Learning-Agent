version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
      - go-backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  go-backend:
    build:
      context: ./go-backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - ./go-backend/.env
    environment:
      - PYTHON_BACKEND_URL=http://backend:8000
    restart: unless-stopped
